<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarkdownEditor</title>

    <!-- highlight.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"
          id="hljs-light-theme">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
          id="hljs-dark-theme" disabled>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <!-- markdown-it -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.0.0/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-task-lists@2.1.1/dist/markdown-it-task-lists.min.js"></script>

    <!-- Mermaid -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>

    <!-- Turndown (HTML to Markdown) -->
    <script src="https://cdn.jsdelivr.net/npm/turndown@7.1.3/dist/turndown.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/turndown-plugin-gfm@1.0.2/dist/turndown-plugin-gfm.js"></script>

    <!-- Editor styles -->
    <link rel="stylesheet" href="editor.css">

    <script>
        function updateHljsTheme(theme) {
            const isDark = (theme === 'dark');
            document.getElementById('hljs-light-theme').disabled = isDark;
            document.getElementById('hljs-dark-theme').disabled = !isDark;
        }
    </script>
</head>
<body>
    <div id="editor-container">
        <!-- Single editing + rendering surface -->
        <div id="editor"
             contenteditable="true"
             spellcheck="true"
             role="textbox"
             aria-multiline="true"
             aria-label="Markdown editor"></div>
    </div>

    <!-- Editor engine -->
    <script src="editor.js"></script>

    <script>
        (function() {
            const origSetTheme = window.editorAPI.setTheme;
            window.editorAPI.setTheme = function(theme) {
                origSetTheme(theme);
                updateHljsTheme(theme);
            };
        })();
    </script>
</body>
</html>
